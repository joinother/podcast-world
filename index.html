<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodcastWorld 路 鎾涓栫晫</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">

</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script>
(function(){
  function doTransform(){
    var ss=document.querySelectorAll("script[type=text/babel]");
    if(!ss.length){setTimeout(doTransform,100);return}
    var src=ss[0].textContent||"";
    if(!src){document.getElementById("root").innerHTML="<pre style=color:red>Error: empty script</pre>";return}
    try{
      var r=Babel.transform(src,{presets:["react"]});
      if(!r||!r.code){document.getElementById("root").innerHTML="<pre style=color:red>Babel returned empty</pre>";return}
      var ns=document.createElement("script");
      ns.textContent=r.code;
      document.body.appendChild(ns);
      ss[0].remove();
    }catch(e){document.getElementById("root").innerHTML="<pre style=color:red>Transform error: "+e.message+"</pre>"}
  }
  if(typeof Babel==="undefined"){setTimeout(doTransform,500)}else{doTransform()}
})();
</script>
</body>
</html>
