function TxPanel({pod,time}){const lines=useMemo(()=>genTx(pod),[pod]);const ai=useMemo(()=>{let idx=0;for(let i=0;i<lines.length;i++){if(lines[i].time<=time)idx=i;}return idx;},[time,lines]);return(<div className="tp">{lines.map((l,i)=>(<div key={i} className={`tl${i===ai?" on":""}`}><div className="ttm">{ft(l.time)}</div><div className="to">{l.o}</div><div className="ttr">{l.t}</div></div>))}</div>);}
function AIChat({pod}){const[msgs,setMsgs]=useState([]);const[inp,setInp]=useState("");const[th,setTh]=useState(false);const br=useRef(null);useEffect(()=>{br.current?.scrollIntoView({behavior:"smooth"});},[msgs]);const ask=(q)=>{const q2=q||inp.trim();if(!q2)return;setMsgs(m=>[...m,{role:"user",text:q2}]);setInp("");setTh(true);setTimeout(()=>{const r=AI_R[Math.floor(Math.random()*AI_R.length)];setMsgs(m=>[...m,{role:"ai",text:r}]);setTh(false);},1200+Math.random()*800);};return(<div className="ac"><div style={{fontSize:".72rem",color:"rgba(255,255,255,.42)",marginBottom:"6px"}}><span style={{fontSize:".85rem"}}>🤖</span> AI 助手（基于当前播客内容）</div>{msgs.length===0&&<div style={{fontSize:".76rem",color:"rgba(255,255,255,.42)",padding:"8px 0"}}>向 AI 助手提问，获取播客内容的解读和分析</div>}{msgs.map((m,i)=>(<div key={i} className={`am ${m.role==="user"?"us":"ai"}`}><div className="av">{m.role==="user"?"U":"AI"}</div><div className="bb">{m.text}</div></div>))}{th&&<div className="am ai"><div className="av">AI</div><div className="bb"><div className="tdb"><span/><span/><span/></div></div></div>}<div className="aiw"><textarea className="ain" placeholder="向 AI 提问…" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),ask())} rows={1}/><button className="as" onClick={()=>ask()} disabled={!inp.trim()&&!th}>↑</button></div>{msgs.length===0&&<div className="asug">{AI_Q.map((q,i)=><button key={i} className="asb" onClick={()=>ask(q)}>{q}</button>)}</div>}</div>);}
function FullPlayer({pod,onClose}){const[pl,setPl]=useState(false);const[pr,setPr]=useState(0);const[tm,setTm]=useState(0);const[dr]=useState(370);const[sp,setSp]=useState(1);const[tb,setTb]=useState("transcript");const iv=useRef(null);useEffect(()=>{if(pl){iv.current=setInterval(()=>{setTm(t=>{if(t>=dr){setPl(false);return 0;}return t+1;});setPr(p=>Math.min(p+1/dr*100,100));},1000/sp);}else{clearInterval(iv.current);}return()=>clearInterval(iv.current);},[pl,sp,dr]);const sk=pct=>{const t=dr*pct/100;setTm(t);setPr(pct);};return(<div className="fpo"><button className="fpcl" onClick={onClose}>✕</button><div className="fpcw"><img src={pod.cover} alt={pod.title} onError={e=>{e.target.src="https://picsum.photos/600/600";}}/></div><div className="fpi"><div className="fpt">{pod.title}</div><div className="fpa">{pod.author}</div></div><div className="fppr"><div className="fptime"><span>{ft(tm)}</span><span>{ft(dr)}</span></div><input type="range" className="fpsl" min="0" max="100" value={pr} onChange={e=>sk(Number(e.target.value))}/></div><div className="fpctr"><button onClick={()=>{setTm(t=>Math.max(0,t-15));setPr(p=>Math.max(0,p-15/dr*100));}}>⏪</button><button className="fppl" onClick={()=>setPl(p=>!p)}>{pl?"⏸":"▶"}</button><button onClick={()=>{setTm(t=>Math.min(dr,t+30));setPr(p=>Math.min(100,p+30/dr*100));}}>⏩</button></div><div className="fpext"><button className={`fpeb${tb==="transcript"?" on":""}`} onClick={()=>setTb("transcript")}>📝 原文</button><button className={`fpeb${tb==="ai"?" on":""}`} onClick={()=>setTb("ai")}>🤖 AI 助手</button><button className="fpeb" onClick={()=>window.open(pod.website,"_blank")}>🌐 官网</button><button className="fpeb" onClick={()=>window.open(pod.rss,"_blank")}>📡 RSS</button></div><div className="sprow">{[0.5,0.75,1,1.25,1.5,2].map(s=><button key={s} className={`spb${sp===s?" on":""}`} onClick={()=>setSp(s)}>{s}x</button>)}</div><div className="fptabs"><div className="fptbs"><button className={`fptb${tb==="transcript"?" on":""}`} onClick={()=>setTb("transcript")}>原文 & 翻译</button><button className={`fptb${tb==="ai"?" on":""}`} onClick={()=>setTb("ai")}>AI 问答</button></div>{tb==="transcript"?<TxPanel pod={pod} time={tm}/>:<AIChat pod={pod}/>}</div></div>);}
function PlayerBar({pod,pl,onPl,onPs,onExp,pr,tm,dr}){if(!pod)return null;return(<div className={`pb2 ${pod?"vis":""}`}><div className="pbc"><div className="pth"><img src={pod.cover} alt={pod.title} onError={e=>{e.target.src="https://picsum.photos/200/200";}}/></div><div className="pif"><div className="ptt">{pod.title}</div><div className="pau">{pod.author}</div></div><div className="pctrl"><button>⏪</button><button className="ppp" onClick={()=>pl?onPs():onPl()}>{pl?"⏸":"▶"}</button><button>⏩</button></div><div className="pprog"><span className="propt">{ft(tm)}</span><div className="pror"><div className="prof" style={{width:pr+"%"}}/></div><span className="propt">{ft(dr)}</span></div><div className="vrow"><span>🔊</span><input type="range" className="vs" min="0" max="100" defaultValue="80"/></div><button className="pexp" onClick={onExp}>↗</button></div></div>);}
function App({curUser}){const[lang,setLang]=useState("all");const[view,setView]=useState("all");const[cats,setCats]=useState([]);const[sortBy,setSortBy]=useState("popularity");const[q,setQ]=useState("");const[pod,setPod]=useState(null);const[pl,setPl]=useState(false);const[pr,setPr]=useState(0);const[tm,setTm]=useState(0);const[sf,setSf]=useState(false);const[dp,setDp]=useState(null);const[dl,setDl]=useState(()=>{try{return JSON.parse(localStorage.getItem(DK)||"[]";}catch(e){return[];}});const[fav,setFav]=useState(()=>{try{return JSON.parse(localStorage.getItem(FK)||"[]";}catch(e){return[];}});useEffect(()=>{localStorage.setItem(FK,JSON.stringify(fav));},[fav]);useEffect(()=>{localStorage.setItem(DK,JSON.stringify(dl));},[dl]);const tf=id=>setFav(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);const filt=useMemo(()=>{let b=view==="fav"?PODCASTS.filter(p=>fav.includes(p.id)):PODCASTS;if(view==="all"&&lang!=="all")b=b.filter(p=>p.lang===lang);if(cats.length>0)b=b.filter(p=>cats.some(c=>p.cats.includes(c)));if(q.trim()){const qq=q.toLowerCase();b=b.filter(p=>p.title.toLowerCase().includes(qq)||p.author.toLowerCase().includes(qq)||p.desc.toLowerCase().includes(qq));}if(sortBy==="popularity")b=[...b].sort((a,b)=>b.popularity-a.popularity);else if(sortBy==="subscribers")b=[...b].sort((a,b)=>b.subscribers-a.subscribers);else b=[...b].sort((a,b)=>b.id-a.id);return b;},[lang,cats,sortBy,q,view,fav]);const hP=pod=>{setPod(pod);setPl(true);setPr(0);setTm(0);setSf(false);};const hDl=pod=>{if(!dl.find(d=>d.id===pod.id))setDl(d=>[...d,pod]);};const hRm=id=>setDl(d=>d.filter(x=>x.id!==id));const tPfx=view==="fav"?"❤️ 我的收藏":lang==="all"?"🌐 全球播客":(LANGUAGES.find(l=>l.code===lang)?.name||"")+" 播客";return(<div className="app"><div className="tb"><Logo/><SearchBar q={q} setQ={setQ} onS={v=>setQ(v)}/><div className="ta"><button className={`ib ${fav.length>0?" hb-bg":""}`} onClick={()=>{setView("fav");setLang("all");}} title="我的收藏">❤️ {fav.length>0&&<span className="bdg">{fav.length}</span>}</button><button className="ib" onClick={()=>setDl(v=>!v)} title="下载管理">📥 {dl.length>0&&<span className="bdg">{dl.length}</span>}</button></div></div><div className="ml"><Sidebar lang={lang} setLang={setLang} view={view} setView={setView} fc={fav.length}/><div className="ct"><div className="fb">{CATEGORIES.slice(0,14).map(c=>(<button key={c.id} className={`ft${cats.includes(c.id)?" act":""}`} onClick={()=>setCats(cs=>cs.includes(c.id)?cs.filter(x=>x!==c.id):[...cs,c.id])}>{c.emoji} {c.name}</button>))}<select className="sel" value={sortBy} onChange={e=>setSortBy(e.target.value)}><option value="popularity">🔥 热度排序</option><option value="subscribers">👥 订阅数</option><option value="recent">🕐 最新收录</option></select></div><div className="cs"><div className="gh"><h2>{tPfx} {cats.length>0&&`· 已选${cats.length}个分类`}</h2><span className="cnt">{filt.length} 个播客</span></div>{filt.length===0?(<div className="es"><i>🎙</i><h3>暂无匹配结果</h3><p>{view==="fav"?"您还没有收藏任何播客，快去探索吧！":"试试调整筛选条件或搜索其他关键词"}</p></div>):(<div className="pg">{filt.map(p=>(<PodCard key={p.id} pod={p} onP={hP} ip={pl&&pod?.id===p.id} onDl={hDl} id={!!dl.find(d=>d.id===p.id)} onDet={setDp} isFav={fav.includes(p.id)} onTF={tf}/>))}</div>)}</div></div>{dl&&<DlPanel dls={dl} onRm={hRm}/>}</div><PlayerBar pod={pod} pl={pl} onPl={()=>setPl(true)} onPs={()=>setPl(false)} onExp={()=>setSf(true)} pr={pr} tm={tm} dr={370}/>{sf&&pod&&<FullPlayer pod={pod} onClose={()=>setSf(false)}/>}{dp&&<DetailModal pod={dp} onClose={()=>setDp(null)} onP={hP} onDl={hDl} isFav={fav.includes(dp.id)} onTF={tf}/>}</div>);}
function Root(){const[showLock,setShowLock]=useState(true);const[user,setUser]=useState(null);if(showLock)return<PasskeyLock onUnlock={u=>{setUser(u);setShowLock(false);}}/>;return<App curUser={user}/>;}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
